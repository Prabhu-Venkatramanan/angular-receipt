<div class="d-flex vw-100 vh-100 overflow-hidden bg-argon-layout position-relative">
  <div
    class="position-absolute top-0 start-0 w-100 exact-argon-banner"
    style="height: 320px; z-index: 1"
  ></div>

  <div class="h-100 flex-shrink-0 p-3 position-relative" style="width: 270px; z-index: 20">
    <app-sidebar class="h-100"></app-sidebar>
  </div>

  <div
    class="d-flex flex-column flex-grow-1 h-100 overflow-auto position-relative"
    style="z-index: 10"
  >
    <app-navbar class="w-100" (logoutTriggered)="handleGlobalLogout()"></app-navbar>

    <main class="flex-grow-1 px-4 pb-4 dashboard-main-view">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<app-loader [isLoading]="isGlobalLoading" style="position: relative; z-index: 999999"></app-loader>

<app-alert-message></app-alert-message>
